<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Форма выбора питомца</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main>
    <h1>Найди себе друга!</h1>
<form action="/pets/orders" method="post">
    <label for="petType"></label>
    <select name="petType" id="petType" required>
        <option value="Mammal" selected>Млекопитающее</option>
        <option value="Fish">Рыба</option>
        <option value="Bird">Птица</option>
    </select>

    <label>
        <input type="radio" name="gender" value="Male"> Самец
    </label>
    <label>
        <input type="radio" name="gender" value="Female" checked> Самка
    </label>
    <label>
        <input type="radio" name="gender" value="Other"> Anything
    </label>

    <label for="eyeColor"></label>
    <select name="eyeColor" id="eyeColor" required>
        <option value="Blue" selected>Синий</option>
        <option value="Green">Зелёный</option>
        <option value="Other">Другой</option>
    </select>

    <textarea name="rules" id="rules" placeholder="правила введи для животинки"></textarea>
    <input type="tel" name="phone" placeholder="Телефон"></input>
    <input type="email" name="email" placeholder="Почта"></input>
    <label for="tailLength"></label>
    <input type="number" name="tailLength" id="tailLength" value="10" required>

    <label for="name"></label>
    <input type="text" name="name" id="name" value="default name" required>

    <label for="dateOfBirth"></label>
    <input type="date" name="dateOfBirth" id="dateOfBirth" value="2025-01-01" required>

    <button type="submit">Отправить</button>
</form>
</main>
</body>
</html>
