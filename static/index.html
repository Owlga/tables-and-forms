<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Форма выбора питомца</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main>
    <h1>Найди себе друга!</h1>

<form action="/pets/orders" method="post">
    <label for="petType"></label>

    <select name="petType" id="petType" required>
        <option value="cat" selected>Млекопитающее</option>
        <option value="dog">Рыба</option>
        <option value="tiger">Птица</option>
    </select>

    <label>
        <input type="radio" name="gender" value="boy"> Самец
    </label>
    <label>
        <input type="radio" name="gender" value="girl" checked> Самка
    </label>
    <label>
        <input type="radio" name="gender" value="none"> Anything
    </label>

    <label for="eyeColor"></label>
    <input type="color" name="eyeColor" id="eyeColor" value="#000000" required>

    <label for="tailLength"></label>
    <input type="number" name="tailLength" id="tailLength" value="10" required>

    <label for="name"></label>
    <input type="text" name="name" id="name" value="default name" required>

    <label for="dateOfBirth"></label>
    <input type="date" name="dateOfBirth" id="dateOfBirth" value="2025-01-01" required>

    <label for="phone"></label>
    <input type="tel" name="phone" id="phone" placeholder="Телефон" value="89000000000" required>

    <label for="email"></label>
    <input type="email" name="email" id="email" placeholder="Почта" value="valid@mail.ru" required>

    <label>
        <input type="radio" name="rules" value="true" checked> RULES
    </label>

    <button type="submit">Отправить</button>

    <button type="button" id="resetButton">Сбросить</button>
</form>
</main>
<script src="index.js"></script>
</body>
</html>
